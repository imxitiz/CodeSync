<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var mode = localStorage.getItem('codesync.themeMode');
          if (!mode) mode = 'auto';
          if (mode === 'dark' || (mode === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/logo.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>CodeSync - Real-time Code Collaboration</title>
    <meta name="title" content="CodeSync - Real-time Code Collaboration" />
    <meta name="description" content="A real-time collaborative code editor for seamless team programming. Create rooms, share code, and collaborate instantly." />
    <meta name="keywords" content="code editor, collaboration, real-time, programming, coding, live coding, pair programming" />
    <meta name="author" content="CodeSync Team" />
    <meta name="robots" content="index, follow" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4aee88" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CodeSync" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/logo.png" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://codesync.kshitizsharma.com.np/" />
    <meta property="og:title" content="CodeSync - Real-time Code Collaboration" />
    <meta property="og:description" content="A real-time collaborative code editor for seamless team programming. Create rooms, share code, and collaborate instantly." />
    <meta property="og:image" content="/mainlogo.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://codesync.kshitizsharma.com.np/" />
    <meta property="twitter:title" content="CodeSync - Real-time Code Collaboration" />
    <meta property="twitter:description" content="A real-time collaborative code editor for seamless team programming. Create rooms, share code, and collaborate instantly." />
    <meta property="twitter:image" content="/mainlogo.png" />
    
    <!-- Preload critical resources -->
    <link rel="preload" href="/mainlogo.png" as="image" />
    
    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
